<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Easy English Listening</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background-color: #f5f5f5;
}

.container {
  margin-top: 100px;
}

.sentence {
  font-size: 40px;
  margin: 30px;
}

button {
  font-size: 25px;
  padding: 15px 25px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background-color: #4CAF50;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>Easy English</h1>
  
  <div class="sentence" id="sentence">
    I am going to the market.
  </div>

  <button onclick="speak()">🔊 듣기</button>
  <button onclick="repeatSlow()">🐢 천천히</button>
  <button onclick="nextSentence()">➡️ 다음</button>
</div>

<script>
const sentences = [
  "I am going to the market.",
  "Can you help me?",
  "I will call you later.",
  "Please speak slowly.",
  "I understand a little."
];

let index = 0;

function speak() {
  const utterance = new SpeechSynthesisUtterance(sentences[index]);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);
}

function repeatSlow() {
  const utterance = new SpeechSynthesisUtterance(sentences[index]);
  utterance.lang = "en-US";
  utterance.rate = 0.6;
  speechSynthesis.speak(utterance);
}

function nextSentence() {
  index = (index + 1) % sentences.length;
  document.getElementById("sentence").innerText = sentences[index];
}
</script>

</body>
</html>
