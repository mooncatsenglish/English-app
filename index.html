<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy English</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to bottom, #f0f4ff, #ffffff);
  margin: 0;
}

.container {
  margin-top: 80px;
  padding: 20px;
}

h1 {
  font-size: 40px;
  color: #333;
}

.sentence {
  font-size: 48px;
  margin: 40px 0;
  color: #222;
}

.meaning {
  font-size: 32px;
  color: #666;
  margin-top: 20px;
}

button {
  font-size: 26px;
  padding: 15px 25px;
  margin: 10px;
  border-radius: 15px;
  border: none;
  background-color: #5a8dee;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>Easy English</h1>

  <div class="sentence" id="sentence">
    I am going to the market.
  </div>

  <div class="meaning" id="meaning"></div>

  <button onclick="speak()">🔊 듣기</button>
  <button onclick="slow()">🐢 천천히</button>
  <button onclick="next()">➡️ 다음</button>
  <button onclick="showMeaning()">📖 뜻</button>
</div>
<script>
const sentences = [
  "I had a bank account for a few years.",
  "I make sure my account is always in credit.",
  "I go to the cashpoint once a week.",
  "I check my account online.",
  "I had to get a bank loan to pay my fees.",
  "I don’t have to pay it back until I get a job.",
  "At the moment I’m saving up for a new laptop.",
  "I can’t afford to have a car.",
  "We had to pay a deposit for the flat.",
  "The rent is quite high."
];

const meanings = [
  "나는 몇 년 동안 은행 계좌를 가지고 있었어요.",
  "나는 내 계좌에 항상 돈이 남아 있도록 확인해요.",
  "나는 일주일에 한 번 현금인출기에 가요.",
  "나는 온라인으로 계좌를 확인해요.",
  "나는 학비를 내기 위해 대출을 받아야 했어요.",
  "나는 취업할 때까지 갚을 필요가 없어요.",
  "지금 나는 새 노트북을 사기 위해 돈을 모으고 있어요.",
  "나는 차를 가질 여유가 없어요.",
  "우리는 집 보증금을 내야 했어요.",
  "월세가 꽤 비싸요."
];

let index = 0;
let show = false;

function speak() {
  let u = new SpeechSynthesisUtterance(sentences[index]);
  u.lang = "en-US";
  speechSynthesis.speak(u);
}

function slow() {
  let u = new SpeechSynthesisUtterance(sentences[index]);
  u.lang = "en-US";
  u.rate = 0.6;
  speechSynthesis.speak(u);
}

function next() {
  index = (index + 1) % sentences.length;
  document.getElementById("sentence").innerText = sentences[index];
  document.getElementById("meaning").innerText = "";
  show = false;
}

function showMeaning() {
  if (!show) {
    document.getElementById("meaning").innerText = meanings[index];
    show = true;
  } else {
    document.getElementById("meaning").innerText = "";
    show = false;
  }
}
</script>

</body>
</html>
